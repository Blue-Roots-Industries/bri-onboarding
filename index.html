<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRI New Employee Onboarding | Blue Roots Industries</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Calibri','Segoe UI',Arial,sans-serif;background:#F0F2F5;min-height:100vh}

/* HEADER */
.header{background:#024977;padding:18px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.header img{height:44px;flex-shrink:0}
.header-text h1{color:#fff;font-size:20px;font-weight:700;margin:0}
.header-text p{color:rgba(255,255,255,0.65);font-size:12px;margin:2px 0 0}
.header-right{margin-left:auto;text-align:right}
.score-chip{background:rgba(255,255,255,0.15);color:#fff;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700}

/* PROGRESS */
.progress-wrap{background:#013a5e;height:8px}
.progress-fill{background:#C19A6B;height:8px;transition:width 0.6s ease;min-width:0}

/* CHAPTER NAV */
.chapter-nav{background:#fff;display:flex;gap:0;border-bottom:1px solid #E0E0E0;overflow-x:auto;padding:0 24px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.chapter-nav::-webkit-scrollbar{height:3px}
.chapter-nav::-webkit-scrollbar-thumb{background:#C19A6B;border-radius:3px}
.ch-btn{padding:14px 16px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#666;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-1px;font-family:'Calibri','Segoe UI',Arial,sans-serif;font-weight:500;transition:all 0.2s;flex-shrink:0}
.ch-btn:hover{color:#024977}
.ch-btn.active{color:#024977;border-bottom-color:#024977;font-weight:700}
.ch-btn.done::after{content:' ✓';color:#2E8B57;font-size:11px}

/* CONTENT LAYOUT */
.content-area{max-width:820px;margin:0 auto;padding:28px 20px 60px}

/* CARDS */
.card{background:#fff;border-radius:12px;border:1px solid #E8E8E8;padding:24px;margin-bottom:20px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.card-title{color:#024977;font-size:20px;font-weight:700;margin-bottom:4px}
.card-sub{color:#888;font-size:13px;margin-bottom:18px}

/* FACT GRID */
.fact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.fact-card{background:#F3F4F8;border-radius:8px;padding:12px 14px;border-left:3px solid #024977}
.fact-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#888}
.fact-value{font-size:15px;font-weight:700;color:#024977;margin-top:3px}

/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pill{background:#E8F1F8;color:#024977;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}

/* INFO BOX */
.info-box{background:#F3F4F8;border-radius:8px;padding:14px 16px;margin:12px 0;font-size:13px;line-height:1.8;color:#333}
.info-box b{color:#024977}

/* FLIP CARDS */
.flip-hint{font-size:11px;color:#aaa;text-align:center;margin-bottom:8px}
.flipcard-wrap{perspective:700px;margin-bottom:10px;cursor:pointer;user-select:none}
.flipcard{width:100%;min-height:90px;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(.4,0,.2,1)}
.flipcard.flipped{transform:rotateY(180deg)}
.flipcard-front,.flipcard-back{position:absolute;top:0;left:0;width:100%;min-height:90px;backface-visibility:hidden;border-radius:10px;padding:18px 20px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px}
.flipcard-front{background:#024977;color:#fff;font-weight:700;font-size:16px}
.flipcard-back{background:#C19A6B;color:#fff;transform:rotateY(180deg);line-height:1.6;font-size:13px}
.flip-tap{font-size:10px;opacity:0.7;margin-top:4px}

/* QUIZ */
.scenario-box{background:#F8F9FB;border:1px solid #E0E0E8;border-radius:10px;padding:18px 20px;margin-bottom:14px}
.scenario-q{font-size:14px;color:#222;line-height:1.65;margin-bottom:14px;white-space:pre-line}
.options{display:flex;flex-direction:column;gap:8px}
.opt-btn{padding:11px 16px;border-radius:8px;border:1.5px solid #E0E0E0;background:#fff;text-align:left;cursor:pointer;font-size:13px;font-family:'Calibri','Segoe UI',Arial,sans-serif;color:#333;transition:all 0.2s;line-height:1.4}
.opt-btn:hover:not([disabled]){border-color:#024977;background:#EBF3FA;color:#024977}
.opt-btn.correct{border-color:#2E8B57!important;background:#E8F7EF!important;color:#1a6b3a!important;font-weight:700}
.opt-btn.wrong{border-color:#C0392B!important;background:#FDECEA!important;color:#8B1A1A!important}
.opt-btn.reveal{border-color:#2E8B57!important;background:#E8F7EF!important;color:#1a6b3a!important;opacity:0.65}
.feedback{margin-top:12px;padding:11px 14px;border-radius:8px;font-size:13px;line-height:1.6}
.feedback.good{background:#E8F7EF;color:#1a6b3a;border-left:4px solid #2E8B57}
.feedback.bad{background:#FDECEA;color:#8B1A1A;border-left:4px solid #C0392B}

/* MATCH GAME */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.match-col{display:flex;flex-direction:column;gap:7px}
.match-item{padding:10px 13px;border-radius:8px;border:1.5px solid #E0E0E0;font-size:12px;cursor:pointer;text-align:center;background:#fff;transition:all 0.2s;font-family:'Calibri','Segoe UI',Arial,sans-serif;color:#333;line-height:1.4;min-height:48px;display:flex;align-items:center;justify-content:center}
.match-item:hover:not(.matched):not(.wrong-match){border-color:#024977;background:#EBF3FA}
.match-item.selected{border-color:#024977;background:#EBF3FA;font-weight:700;color:#024977}
.match-item.matched{border-color:#2E8B57!important;background:#E8F7EF!important;color:#1a6b3a!important;cursor:default;font-weight:700}
.match-item.wrong-match{border-color:#C0392B!important;background:#FDECEA!important}
.match-feedback{font-size:13px;color:#666;min-height:20px;margin-top:4px;font-weight:600}

/* NAV BUTTONS */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.btn-next{padding:12px 28px;background:#024977;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Calibri','Segoe UI',Arial,sans-serif;transition:background 0.2s}
.btn-next:hover{background:#013a5e}
.btn-back{padding:12px 20px;background:#fff;color:#024977;border:1.5px solid #024977;border-radius:8px;cursor:pointer;font-size:13px;font-family:'Calibri','Segoe UI',Arial,sans-serif;transition:all 0.2s}
.btn-back:hover{background:#EBF3FA}

/* CERTIFICATE */
.cert-wrap{background:linear-gradient(145deg,#024977 0%,#013a5e 100%);border-radius:14px;padding:32px;text-align:center;color:#fff;margin-top:16px;border:3px solid #C19A6B}
.cert-wrap h3{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:0.5px}
.cert-name{font-size:26px;font-weight:700;color:#C19A6B;margin:12px 0;letter-spacing:0.5px}
.cert-body{font-size:14px;opacity:0.85;line-height:1.7;margin-bottom:14px}
.cert-score{background:rgba(255,255,255,0.1);display:inline-block;padding:8px 20px;border-radius:20px;margin-bottom:14px;font-size:15px;font-weight:700;color:#C19A6B}
.cert-footer{font-size:11px;opacity:0.55;margin-top:8px}
.cert-seals{display:flex;justify-content:center;gap:12px;margin:12px 0;flex-wrap:wrap}
.cert-seal{background:rgba(255,255,255,0.1);padding:5px 14px;border-radius:20px;font-size:11px;opacity:0.8}
.cert-input{width:100%;padding:12px 16px;border-radius:8px;border:1.5px solid #E0E0E0;font-size:15px;font-family:'Calibri','Segoe UI',Arial,sans-serif;margin-bottom:12px}
.cert-input:focus{outline:none;border-color:#024977}
.btn-cert{width:100%;padding:13px;background:#024977;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700;font-family:'Calibri','Segoe UI',Arial,sans-serif}
.btn-cert:hover{background:#013a5e}
.confetti-icon{font-size:52px;margin-bottom:8px}

/* OVERTIME TABLE */
.ot-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.ot-table th{background:#024977;color:#fff;padding:9px 12px;text-align:left}
.ot-table td{padding:9px 12px;border-bottom:1px solid #F0F0F0}
.ot-table tr:nth-child(even) td{background:#F8F9FB}

/* WELCOME HERO */
.hero{background:linear-gradient(135deg,#024977 0%,#036191 100%);border-radius:12px;padding:28px 24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;background:rgba(193,154,107,0.15);border-radius:50%}
.hero h2{font-size:24px;font-weight:700;margin-bottom:6px}
.hero p{font-size:14px;opacity:0.85;line-height:1.6}
.hero .tagline{font-size:18px;font-weight:700;color:#C19A6B;margin-top:10px}

/* SECTION LABEL */
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:14px;font-weight:700}

/* PRINT / RESPONSIVE */
@media(max-width:600px){
  .header{padding:14px 16px}
  .header-text h1{font-size:16px}
  .content-area{padding:16px 12px 50px}
  .card{padding:18px 16px}
  .fact-grid{grid-template-columns:1fr 1fr}
  .match-grid{grid-template-columns:1fr 1fr}
  .match-item{font-size:11px;padding:8px}
}
</style>
</head>

function countTotal() {

    html += '<button class="' + cls + '" onclick="goChapter(' + i + ')">' + CHAPTERS[i].title + '</button>';

function isDone(i) {

  if (!QUIZ_DATA[i]) return state.chapter > i;
  var qs = QUIZ_DATA[i];
  for (var j = 0; j < qs.length; j++) {

  return true;
}

    html += '</div>';
    if (isAnswered) {
      var good = answered === q.ans;
      html += '<div class="feedback ' + (good ? 'good' : 'bad') + '">' + q.fb.replace(/\n/g, '<br>') + '</div>';
    }
    html += '</div>';
  }
  return html;
}

function answer(chId, qi, selected) {
  var key = chId + '_' + qi;
  if (state.answered[key] !== undefined && state.answered[key] !== null) return;
  state.answered[key] = selected;
  if (selected === QUIZ_DATA[chId][qi].ans) state.correct++;
  updateScore();
  renderContent();
}

function renderContent() {
  var ch = state.chapter;
  var html = '';
  if (ch === 0) html = chapter0();
  else if (ch === 1) html = chapter1();
  else if (ch === 2) html = chapter2();
  else if (ch === 3) html = chapter3();
  else if (ch === 4) html = chapter4();
  else if (ch === 5) html = chapter5();
  document.getElementById('contentArea').innerHTML = html;
  if (ch === 4) renderMatchGame();
}

function navRow(showBack, showNext, nextLabel) {
  var html = '<div class="nav-row">';
  if (showBack) html += '<button class="btn-back" onclick="goChapter(' + (state.chapter - 1) + ')">&#8592; Back / Kembali</button>';
  else html += '<span></span>';
  if (showNext) html += '<button class="btn-next" onclick="goChapter(' + (state.chapter + 1) + ')">' + (nextLabel || 'Next / Seterusnya &#8594;') + '</button>';
  html += '</div>';
  return html;
}

var matchShuffle = [];
var matchRightShuffle = [];

function renderMatchGame() {
  var el = document.getElementById('matchGame');
  if (!el) return;
  if (matchShuffle.length === 0) {
    matchShuffle = MATCH_PAIRS.map(function(p, i) { return {text: p.left, id: i}; });
    matchRightShuffle = MATCH_PAIRS.map(function(p, i) { return {text: p.right, id: i}; });
    matchShuffle.sort(function() { return Math.random() - 0.5; });
    matchRightShuffle.sort(function() { return Math.random() - 0.5; });
  }
  var leftHtml = matchShuffle.map(function(p) {
    var cls = 'match-item' + (state.matchDone[p.id] ? ' matched' : '') + (state.matchSel.left === p.id ? ' selected' : '');
    return '<div class="' + cls + '" id="ml_' + p.id + '" onclick="selectMatch(\'left\',' + p.id + ')">' + p.text + '</div>';
  }).join('');
  var rightHtml = matchRightShuffle.map(function(p) {
    var cls = 'match-item' + (state.matchDone[p.id] ? ' matched' : '') + (state.matchSel.right === p.id ? ' selected' : '');
    return '<div class="' + cls + '" id="mr_' + p.id + '" onclick="selectMatch(\'right\',' + p.id + ')">' + p.text + '</div>';
  }).join('');
  el.innerHTML = '<div class="match-grid"><div class="match-col">' + leftHtml + '</div><div class="match-col">' + rightHtml + '</div></div><div class="match-feedback" id="matchFb"></div>';
}

function selectMatch(side, id) {
  if (state.matchDone[id]) return;
  state.matchSel[side] = id;
  document.querySelectorAll('.match-item').forEach(function(el) {
    if (!el.classList.contains('matched')) el.classList.remove('selected');
  });
  var el = document.getElementById((side === 'left' ? 'ml_' : 'mr_') + id);
  if (el) el.classList.add('selected');
  if (state.matchSel.left !== null && state.matchSel.right !== null) {
    var fb = document.getElementById('matchFb');
    if (state.matchSel.left === state.matchSel.right) {
      state.matchDone[state.matchSel.left] = true;
      ['ml_', 'mr_'].forEach(function(p) {
        var e = document.getElementById(p + state.matchSel.left);
        if (e) { e.classList.remove('selected'); e.classList.add('matched'); }
      });
      var allDone = Object.keys(state.matchDone).length === MATCH_PAIRS.length;
      if (fb) fb.innerHTML = allDone ? '<span style="color:#024977;font-weight:700">&#127881; All matched! Great job! / Semua dipadan! Bagus!</span>' : '<span style="color:#2E8B57">&#10003; Match! Keep going! / Padan! Teruskan!</span>';
    } else {
      ['ml_' + state.matchSel.left, 'mr_' + state.matchSel.right].forEach(function(id2) {
        var e = document.getElementById(id2);
        if (e) {
          e.classList.add('wrong-match');
          setTimeout(function() { e.classList.remove('wrong-match', 'selected'); }, 700);
        }
      });
      if (fb) fb.innerHTML = '<span style="color:#C0392B">&#10005; Try again! / Cuba lagi!</span>';
    }
    state.matchSel = {left: null, right: null};
  }
}

renderNav();
renderContent();
updateScore();
</script>
</body>
</html>
